apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

nameSuffix: -dev

resources:
  - ../../base
  - configmap.yaml

images:
  - name: nginx
    newName: public.ecr.aws/nginx/nginx
    newTag: "1.28"

patches:
- target:
    kind: Service
    name: kargo-test
  patch: |-
    - op: replace
      path: /spec/ports/0/nodePort
      value: 32050
