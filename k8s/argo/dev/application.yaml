apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo-test-dev
  namespace: argocd
  annotations:
    kargo.akuity.io/authorized-stage: kargo-test:dev
spec:
  project: default
  source:
    repoURL: git@github.com:frankc-cerebras/kargo-test.git
    targetRevision: HEAD
    path: rendered/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    syncOptions:
    - CreateNamespace=true