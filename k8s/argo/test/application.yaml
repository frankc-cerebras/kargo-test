apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo-test-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:frankc-cerebras/kargo-test.git
    targetRevision: HEAD
    path: rendered/test
  destination:
    server: https://kubernetes.default.svc
    namespace: test
  syncPolicy:
    syncOptions:
    - CreateNamespace=true