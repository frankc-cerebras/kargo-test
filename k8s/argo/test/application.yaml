apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo-test-test
  namespace: argocd
  annotations:
    kargo.akuity.io/authorized-stage: kargo-test:staging
spec:
  project: default
  source:
    repoURL: https://github.com/frankc-cerebras/kargo-test
    targetRevision: HEAD
    path: k8s/rendered/test
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    syncOptions:
    - CreateNamespace=true