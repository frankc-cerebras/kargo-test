apiVersion: v1
kind: Service
metadata:
  name: kargo-test
spec:
  ports:
  - nodePort: placeholder
    port: 3000
    protocol: TCP
    targetPort: 80
  selector:
    app: kargo-test
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kargo-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kargo-test
  template:
    metadata:
      labels:
        app: kargo-test
    spec:
      containers:
      - image: public.ecr.aws/nginx/nginx:1.27
        name: nginx
        volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: content
          readOnly: true
      volumes:
      - configMap:
          name: kargo-test-content
        name: content
