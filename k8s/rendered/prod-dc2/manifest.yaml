kind: ConfigMap
metadata:
  labels:
    app: kargo-test-prod-dc2
  name: kargo-test-content-prod-dc2
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: kargo-test-prod-dc2
  name: kargo-test-prod-dc2
spec:
  ports:
  - nodePort: 32053
    port: 3000
    protocol: TCP
    targetPort: 80
  selector:
    app: kargo-test-prod-dc2
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: kargo-test-prod-dc2
  name: kargo-test-prod-dc2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kargo-test-prod-dc2
  template:
    metadata:
      labels:
        app: kargo-test-prod-dc2
    spec:
      containers:
      - image: public.ecr.aws/nginx/nginx:stable@sha256:27d6207bfd9614b1df6a86b5f9ca64e5b7f6d18d08d6243806cf1c52ca3b72e7
        name: nginx
        volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: content
          readOnly: true
      volumes:
      - configMap:
          name: kargo-test-content-prod-dc2
        name: content
