apiVersion: v1
data:
  index.html: |-
    <!DOCTYPE html>
    <html>
    <head>
    <title>dev</title>
    </head>
    <body>

    <h1>dev</h1>

    </body>
    </html>
kind: ConfigMap
metadata:
  labels:
    app: kargo-test-dev
  name: kargo-test-content-dev
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: kargo-test-dev
  name: kargo-test-dev
spec:
  ports:
  - nodePort: 32050
    port: 3000
    protocol: TCP
    targetPort: 80
  selector:
    app: kargo-test-dev
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: kargo-test-dev
  name: kargo-test-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kargo-test-dev
  template:
    metadata:
      labels:
        app: kargo-test-dev
    spec:
      containers:
      - image: public.ecr.aws/nginx/nginx:1.25
        name: nginx
        volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: content
          readOnly: true
      volumes:
      - configMap:
          name: kargo-test-content-dev
        name: content
